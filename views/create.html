<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Post</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="bg-white border-b border-gray-200">
      <div
        class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between"
      >
        <a href="/" class="text-2xl font-bold text-gray-900"> Blog </a>
        <nav class="flex items-center gap-8">
          <a href="/" class="text-sm font-medium text-gray-600 hover:text-gray-900">Feed</a>
          <a href="/create" class="text-sm font-medium text-gray-600 hover:text-gray-900">Create Post</a>
        </nav>
      </div>
    </header>
    <form
      action="/api/posts"
      method="post"
      class="max-w-7xl mx-auto mt-10 bg-white border border-gray-200 rounded-lg p-6 space-y-5"
    >
      <div class="space-y-2">
        <label class="block text-sm font-medium text-gray-700">
          Username
        </label>

        <input
          type="text"
          name="username"
          placeholder="Enter username"
          class="w-full border border-gray-300 rounded-md px-4 py-2 text-gray-900 focus:outline-none focus:border-gray-500"
        />
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-medium text-gray-700"> Content </label>

        <textarea
          name="content"
          placeholder="Write your post..."
          rows="5"
          class="w-full border border-gray-300 rounded-md px-4 py-2 text-gray-900 resize-none focus:outline-none focus:border-gray-500"
        ></textarea>
      </div>

      <button
        type="submit"
        class="bg-gray-900 text-white px-5 py-2 rounded-md cursor-pointer hover:bg-gray-800 transition"
      >
        Submit
      </button>
    </form>
  </body>
</html>
